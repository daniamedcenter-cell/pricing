<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dania Medical Center - Blood Test Packages</title>
    <style>
        :root {
            /* Brand Colors */
            --blush-rose: #E8C3C8;
            --light-gold: #D4AF37;
            --light-gold-fade: #F1E5AC;
            --ivory: #FFFFF0;
            --charcoal: #36454F;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--ivory);
            color: var(--charcoal);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .header {
            background-color: var(--white);
            text-align: center;
            padding: 30px 20px;
            border-bottom: 3px solid var(--light-gold);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .header h1 {
            margin: 0;
            color: var(--charcoal);
            font-size: 28px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header h2 {
            margin: 5px 0 0 0;
            color: var(--light-gold);
            font-weight: 400;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .package-card {
            background-color: var(--white);
            border-top: 5px solid var(--light-gold);
            border-radius: 8px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .package-card:hover {
            transform: translateY(-2px);
        }

        .package-title {
            color: var(--charcoal);
            font-size: 22px;
            font-weight: bold;
            margin-top: 0;
            border-bottom: 1px solid var(--blush-rose);
            padding-bottom: 10px;
        }

        .package-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .meta-tag {
            background-color: var(--light-gold-fade);
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: 600;
            color: var(--charcoal);
        }

        .meta-tag.cost {
            background-color: #E2E8F0;
            border: 1px dashed #CBD5E1;
        }

        .meta-tag.fasting {
            background-color: var(--blush-rose);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--blush-rose);
            color: var(--charcoal);
            font-weight: 600;
        }

        tr:nth-child(even) {
            background-color: #fafafa;
        }

        /* Admin Section */
        .admin-controls {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        button {
            background-color: var(--light-gold);
            color: var(--charcoal);
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #C5A028;
        }

        .admin-form {
            display: none;
            background-color: var(--white);
            padding: 25px;
            border-radius: 8px;
            border: 2px dashed var(--light-gold);
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-family: inherit;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        .note {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        .delete-btn {
            background-color: #ff4c4c;
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            float: right;
            display: none; /* Hidden by default, shown in admin mode */
        }
        .delete-btn:hover {
            background-color: #e60000;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Dania Medical Center</h1>
        <h2>مركز دانيا الطبي</h2>
        <p style="margin-top: 10px; font-weight: bold;">Front Office Reference: Blood Test Packages</p>
    </div>

    <div class="container">
        <div id="packages-container">
            <!-- Packages will be injected here by JavaScript -->
        </div>

        <div class="admin-controls">
            <button id="auth-btn" onclick="authenticate()">Admin Access (Edit/Add)</button>
            
            <div id="admin-section" class="admin-form">
                <h3 style="color: var(--charcoal); border-bottom: 1px solid var(--blush-rose); padding-bottom: 10px;">Add New Package</h3>
                
                <div class="form-group">
                    <label>Package Title</label>
                    <input type="text" id="new-title" placeholder="e.g., 5. COMPREHENSIVE MALE PACKAGE">
                </div>
                
                <div class="form-group">
                    <label>Provider</label>
                    <input type="text" id="new-provider" placeholder="e.g., Micro Health Laboratories">
                </div>
                
                <div class="form-group" style="display: flex; gap: 15px;">
                    <div style="flex: 1;">
                        <label>Selling Price</label>
                        <input type="text" id="new-price" placeholder="e.g., 300 AED">
                    </div>
                    <div style="flex: 1;">
                        <label>Cost Price</label>
                        <input type="text" id="new-cost" placeholder="e.g., 180 AED">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Fasting Requirement</label>
                    <input type="text" id="new-fasting" placeholder="e.g., Yes (10-12 hours)">
                </div>

                <div class="form-group">
                    <label>Special Note / Target Audience (Optional)</label>
                    <input type="text" id="new-note" placeholder="e.g., Includes Free GP Consultation">
                </div>
                
                <div class="form-group">
                    <label>Tests Included</label>
                    <textarea id="new-tests" placeholder="Category | Test1, Test2, Test3&#10;Category 2 | Test 4, Test 5"></textarea>
                    <p class="note">Format: Separate the category and the tests with a vertical bar (|). Put each new category on a new line.</p>
                </div>
                
                <button onclick="addPackage()">Save Package</button>
                <button onclick="resetToDefaults()" style="background-color: var(--charcoal); color: var(--white); margin-left: 10px;">Reset to Defaults</button>
            </div>
        </div>
    </div>

    <script>
        // Initial Default Data with Cost Prices included
        const defaultPackages = [
            {
                id: 1,
                title: "1. GENERAL CHECKUP TEST",
                provider: "Micro Health Laboratories",
                price: "150 AED",
                cost: "100 AED",
                fasting: "Yes (10-12 hours). Fasting is required primarily for an accurate Lipid Profile.",
                note: "",
                testsData: [
                    { category: "General Chemistry", tests: "Calcium, Uric acid, Creatinine, Blood urea nitrogen (BUN), eGFR, AST, ALT, Total protein, Albumin, Direct bilirubin, GGT, Total bilirubin, Alkaline phosphatase, Indirect bilirubin, Serum globulin" },
                    { category: "Iron & Vitamins", tests: "Serum iron, Total iron binding capacity (TIBC), Transferrin saturation %, Vitamin D, Vitamin B12, Ferritin, Folic acid" },
                    { category: "Electrolytes & Others", tests: "Sodium, Chloride, Potassium, LDH" },
                    { category: "Lipid Profile", tests: "Cholesterol, HDL, LDL, VLDL, Triglycerides, Cholesterol/HDL ratio, LDL/HDL ratio" },
                    { category: "Blood Tests & Hormones", tests: "CBC, HbA1c, Average blood glucose, T3, T4, TSH, FSH, PSA, CRP, ESR" }
                ]
            },
            {
                id: 2,
                title: "2. FIRST TRIMESTER PACKAGE",
                provider: "Micro Health Laboratories",
                price: "250 AED",
                cost: "135 AED",
                fasting: "No. This package includes a Random Blood Sugar (RBS) test, which does not require fasting.",
                note: "Target Audience: Expectant mothers in their first trimester of pregnancy.",
                testsData: [
                    { category: "Hematology & Blood Typing", tests: "CBC, Blood Grouping & RH Factor" },
                    { category: "Hormones", tests: "TSH (Thyroid Stimulating Hormone)" },
                    { category: "Diabetic Screening", tests: "RBS (Random Blood Sugar)" },
                    { category: "Infectious Diseases / Serology", tests: "HBsAg, HIV Screening, Rubella IgG, VDRL, HCV Antibody" },
                    { category: "Clinical Pathology", tests: "Urine Routine Analysis" }
                ]
            },
            {
                id: 3,
                title: "3. BASIC HEALTH PACKAGE",
                provider: "Thumbay Lab",
                price: "75 AED",
                cost: "25 AED",
                fasting: "Yes (8-12 hours). Fasting is explicitly required for the Fasting Blood Sugar (FBS) and Lipid Profile.",
                note: "Target Audience: Patients looking for an affordable, essential baseline health checkup.",
                testsData: [
                    { category: "Hematology & Inflammation", tests: "Complete Blood Count (CBC), C-Reactive Protein (CRP)" },
                    { category: "Iron Studies", tests: "Iron, Total Iron Binding Capacity (TIBC)" },
                    { category: "Diabetic Screening", tests: "Fasting Blood Sugar (FBS), Random Blood Sugar (RBS)" },
                    { category: "Organ Function", tests: "Liver Function Profile, Renal (Kidney) Function Profile" },
                    { category: "Lipid Profile", tests: "Lipid Profile, Cholesterol Ratios" }
                ]
            },
            {
                id: 4,
                title: "4. ESSENTIAL TESTS PACKAGE",
                provider: "Thumbay Lab",
                price: "150 AED",
                cost: "85 AED",
                fasting: "Yes (10-12 hours). Fasting is required for an accurate Lipid Profile.",
                note: "Special Note: Includes a Free GP Consultation.",
                testsData: [
                    { category: "Consultation", tests: "Free GP Consultation" },
                    { category: "Hematology", tests: "Complete Blood Count (CBC)" },
                    { category: "Diabetic Screening", tests: "HbA1c — Blood Sugar (3 Months average)" },
                    { category: "Vitamins & Iron Studies", tests: "Vitamin D, Iron Profile (Iron & TIBC)" },
                    { category: "Hormones", tests: "Thyroid Function (TSH, T3, T4)" },
                    { category: "Organ Function", tests: "Liver Profile (LFT), Kidney Profile (RFT)" },
                    { category: "Lipid Profile", tests: "Lipid Profile (Cholesterol)" }
                ]
            }
        ];

        let currentPackages = [];
        let isAdmin = false;

        // Load data from LocalStorage or use defaults
        function loadPackages() {
            const stored = localStorage.getItem('daniaPackages');
            if (stored) {
                currentPackages = JSON.parse(stored);
                
                // Migration logic for old data saved before the cost field existed
                let updated = false;
                currentPackages.forEach(pkg => {
                    if (!pkg.cost) {
                        const match = defaultPackages.find(d => d.title === pkg.title);
                        pkg.cost = match ? match.cost : "N/A";
                        updated = true;
                    }
                });
                if (updated) savePackages();

            } else {
                currentPackages = [...defaultPackages];
                savePackages();
            }
            renderPackages();
        }

        // Save data to LocalStorage
        function savePackages() {
            localStorage.setItem('daniaPackages', JSON.stringify(currentPackages));
        }

        // Render the packages to the screen
        function renderPackages() {
            const container = document.getElementById('packages-container');
            container.innerHTML = '';

            currentPackages.forEach(pkg => {
                let noteHtml = pkg.note ? `<div class="meta-tag">📋 ${pkg.note}</div>` : '';
                let costHtml = pkg.cost ? `<div class="meta-tag cost">📉 Cost: ${pkg.cost}</div>` : '';
                
                let tableRows = pkg.testsData.map(row => `
                    <tr>
                        <td><strong>${row.category}</strong></td>
                        <td>${row.tests}</td>
                    </tr>
                `).join('');

                let deleteBtnHtml = isAdmin ? `<button class="delete-btn" onclick="deletePackage(${pkg.id})">Delete Package</button>` : '';

                const cardHtml = `
                    <div class="package-card">
                        ${deleteBtnHtml}
                        <h2 class="package-title">${pkg.title}</h2>
                        <div class="package-meta">
                            <div class="meta-tag">🏥 Provider: ${pkg.provider}</div>
                            <div class="meta-tag">💰 Price: ${pkg.price}</div>
                            ${costHtml}
                            <div class="meta-tag fasting">⏱️ Fasting: ${pkg.fasting}</div>
                            ${noteHtml}
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th style="width: 30%;">Category</th>
                                    <th>Tests Included</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${tableRows}
                            </tbody>
                        </table>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // Handle Authentication
        function authenticate() {
            if (isAdmin) {
                isAdmin = false;
                document.getElementById('admin-section').style.display = 'none';
                document.getElementById('auth-btn').innerText = 'Admin Access (Edit/Add)';
                renderPackages();
                return;
            }

            const pwd = prompt("Please enter the admin password:");
            if (pwd === "Yousif95") {
                isAdmin = true;
                document.getElementById('admin-section').style.display = 'block';
                document.getElementById('auth-btn').innerText = 'Lock Admin Access';
                renderPackages();
            } else if (pwd !== null) {
                alert("Incorrect Password.");
            }
        }

        // Add a new package
        function addPackage() {
            const title = document.getElementById('new-title').value;
            const provider = document.getElementById('new-provider').value;
            const price = document.getElementById('new-price').value;
            const cost = document.getElementById('new-cost').value || "N/A";
            const fasting = document.getElementById('new-fasting').value;
            const note = document.getElementById('new-note').value;
            const rawTests = document.getElementById('new-tests').value;

            if (!title || !provider || !price) {
                alert("Please fill in at least the Title, Provider, and Price.");
                return;
            }

            const testsData = [];
            const lines = rawTests.split('\n');
            lines.forEach(line => {
                if (line.trim()) {
                    const parts = line.split('|');
                    if (parts.length >= 2) {
                        testsData.push({
                            category: parts[0].trim(),
                            tests: parts[1].trim()
                        });
                    } else {
                        testsData.push({
                            category: "General",
                            tests: line.trim()
                        });
                    }
                }
            });

            const newPkg = {
                id: Date.now(),
                title: title,
                provider: provider,
                price: price.includes("AED") ? price : price + " AED",
                cost: cost.includes("AED") ? cost : cost + " AED",
                fasting: fasting,
                note: note,
                testsData: testsData
            };

            currentPackages.push(newPkg);
            savePackages();
            renderPackages();

            // Clear the form
            document.getElementById('new-title').value = '';
            document.getElementById('new-provider').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('new-cost').value = '';
            document.getElementById('new-fasting').value = '';
            document.getElementById('new-note').value = '';
            document.getElementById('new-tests').value = '';
            
            alert("Package added successfully!");
        }

        // Delete a package
        function deletePackage(id) {
            if(confirm("Are you sure you want to delete this package?")) {
                currentPackages = currentPackages.filter(pkg => pkg.id !== id);
                savePackages();
                renderPackages();
            }
        }

        // Reset system to original state
        function resetToDefaults() {
            if(confirm("Are you sure you want to delete all custom packages and reset to the original default list with cost metrics?")) {
                currentPackages = [...defaultPackages];
                savePackages();
                renderPackages();
            }
        }

        window.onload = loadPackages;
    </script>
</body>
</html>
